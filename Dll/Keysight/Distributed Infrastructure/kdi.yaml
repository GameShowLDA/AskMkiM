config_version: "2"
logging:
    console_sink: true   # enable logging to console
    file_sink: true      # enable logging to log file
    log_level: "info"    # Valid logging levels are: "trace", "debug", "info", "warn", "error", "fatal", "panic"
    max_size: 25         # The maximum size (in megabytes) of the log file before it gets rotated
    max_backup: 10       # The maximum number of old log files to retain
    max_age: 14          # The maximum number of days to retain old log files
    
manager:
    host: "0.0.0.0"
    port: "9090"
    path: "/ws"    
    tls: true
    is_root: false
    announce_mdns: false
    pin_expiration: 5
    pin_window_time: 5
    pin_dos_limit:   100
    pin_block_delay: 120

kdis:
    max_wait_kdis_ready: 10
    api_resp_timeout: 10
    conn_retry_interval: 15

