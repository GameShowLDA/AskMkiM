<p class=PopupTextHeading>Error Queue</p>

<p class=PopupText>The Error Queue is a first-in, first-out (FIFO) data 
 register that stores instrument's error messages until the controller 
 reads them. Whenever the queue holds one or more bytes, it sets the ERR 
 bit (2) of the Status Byte register.</p>
