<p class=PopupTextHeading>Output Queue</p>

<p class=PopupText>The Output Queue is a first-in, first-out (FIFO) data 
 register that stores instrument-to-controller messages until the controller 
 reads them. Whenever the queue holds one or more bytes, it sets the MAV 
 bit (4) of the Status Byte register.</p>
