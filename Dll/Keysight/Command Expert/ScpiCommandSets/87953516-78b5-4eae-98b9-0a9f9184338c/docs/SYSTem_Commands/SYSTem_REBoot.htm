<h2><a name=Syntax_sys_reboot></a>Syntax</h2>

<p class=CmdSyntax>SYSTem:REBoot</p>

<h2><a name=Description_syst_reboot></a>Description</h2>

<p class=Indented1>This command causes the instrument to reboot to its 
 power-on state.</p>

<h2><a name=Example_syst_reboot></a>Example</h2>

<p class=Indented1>The following command reboots the instrument. &nbsp;</p>

<p class=Shaded
	style="background-color: #bfbfbf;">SYST:REB</p>
