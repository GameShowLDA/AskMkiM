<p class=PopupTextHeading>Definite-Length Block Data</p>

<p class=PopupText>Definite-length block response data allows any type 
 of device-dependent data to be transmitted as a series of 8-bit binary 
 data bytes. This is particularly useful for transferring large quantities 
 of data or 8-bit extended ASCII codes. </p>
