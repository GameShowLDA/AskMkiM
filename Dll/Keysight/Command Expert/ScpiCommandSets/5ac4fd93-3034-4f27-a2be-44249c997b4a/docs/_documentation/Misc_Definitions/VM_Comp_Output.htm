        <h1 style="page-break-before: always;"><a name="kanchor584"></a>VM Comp Output (BNC)</h1>
        <p>The rear-panel VM Comp (voltmeter complete) output provides a 3.3 V pulse after each measurement completion to implement a standard hardware handshake sequence between measurement and switching devices.</p>
        <p>
            <img src="../_Graphics_/VM%20Comp_307x120.jpg" style="border-left-style: Ridge;border-left-width: 4px;border-right-style: Ridge;border-right-width: 4px;border-top-style: Ridge;border-top-width: 4px;border-bottom-style: Ridge;border-bottom-width: 4px;float: none;width: 307;height: 120;" border="4" />
        </p>
        <p> The signal shown is for a negative pulse.</p>
