        <p>
            Текст команды обязательно содержит её <u>обозначение (мнемонику)</u> и, при необходимости,
            может включать <strong>метку</strong> и <strong>аргументы</strong>.
            Команда допускает произвольное количество строк в программе контроля,
            а также свободное использование пробелов, комментариев и текстовых сообщений.
