<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>5.3.5 Команда СК (Сброс коммутатора)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../../../../content.css">
</head>
<body>
    <main class="page-content">

        <h2>5.3.5 Команда <code>СК</code> (Сброс Коммутатора)</h2>

        <p>
            Сброс точек коммутатора (объекта контроля) с указанных шин. Если
            шины не указаны, то точки сбрасываются со всех шин.
        </p>

        <h3>Синтаксис</h3>
        <p>
            &lt;метка&gt; СК *&lt;Список шин&gt;*
        </p>

        <h3>Пример</h3>
        <p>
            350 СК *А1,В2*
        </p>
    </main>
</body>
</html>
