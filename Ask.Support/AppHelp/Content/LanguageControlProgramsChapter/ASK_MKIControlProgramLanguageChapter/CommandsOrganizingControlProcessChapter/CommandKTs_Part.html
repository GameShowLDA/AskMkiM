    <title>5.1.8 Команда КЦ (Конец программы контроля)</title>
    <link rel="stylesheet" href="../../../../content.css">

<body>
    <main class="page-content">
        <h2>5.1.8 Команда <code>КЦ</code> (Конец программы контроля)</h2>

        <p>
            Последняя команда программы, выдает на экран результат контроля (количество обнаруженных ошибок в объекте контроля и количество 
            нарушений режимов контроля) и устанавливает АСК в исходное состояние.
        </p>

        <h3>Синтаксис</h3>
        <p>
            &lt;метка&gt; КЦ
        </p>

        <h3>Пример</h3>
        <p>
            60 КЦ
        </p>
    </main>
</body>
</html>
