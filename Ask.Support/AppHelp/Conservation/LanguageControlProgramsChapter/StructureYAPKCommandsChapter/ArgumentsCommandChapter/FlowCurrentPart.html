        <h2>4.3.3 Ток обтекания</h2>
        <p><strong>Ток обтекания</strong> — это максимальная величина измерительного тока, который может протекать через проверяемые цепи ОК в процессе измерений.</p>
        <p><em>Примеры:</em></p>
        <ul>
            <li><code>10 мА</code></li>
            <li><code>100 мА</code></li>
        </ul>
        <p>При задании параметров ПИНТ для указания величины тока используется тот же формат.</p>
    </main>
