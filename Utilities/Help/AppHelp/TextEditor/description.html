<h2>Описание работы редактора</h2>
<p>Редактор предназначен для отображения и редактирования текстов с поддержкой:</p>
<ul>
    <li>Подсветки синтаксиса</li>
    <li>Переноса строк</li>
    <li>Нумерации строк</li>
    <li>Drag-and-Drop</li>
</ul>
<p>Нажмите <kbd>F1</kbd> в приложении, чтобы открыть этот раздел автоматически.</p>
