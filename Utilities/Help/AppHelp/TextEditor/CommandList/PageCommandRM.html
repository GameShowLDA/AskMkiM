<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список команд</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 24px; /* 🔍 Явно увеличенный шрифт */
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h2, h3 {
            font-size: 28px;
            margin-top: 1em;
            color: #2c3e50;
        }

        ul {
            margin-left: 20px;
            padding-left: 0;
        }

        li {
            margin-bottom: 10px;
        }

        strong {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h2>Команда РМ</h2>

    <p>Тут будет какой-то текст</p>
</body>
</html>
