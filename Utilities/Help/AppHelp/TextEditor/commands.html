<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список команд</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 24px; /* 🔍 Явно увеличенный шрифт */
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        h2, h3 {
            font-size: 28px;
            margin-top: 1em;
            color: #2c3e50;
        }

        ul {
            margin-left: 20px;
            padding-left: 0;
        }

        li {
            margin-bottom: 10px;
        }

        strong {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h2>Список команд</h2>

    <p>Ниже приведён список команд и их обозначений.</p>

    <ul>
        <li id="ОК"><strong>ОК</strong> — команда 1.</li>
        <li id="СП"><strong>СП</strong> — команда 2.</li>
        <li id="РМ"><strong>РМ</strong> — команда 3.</li>
        <li id="ЦУ"><strong>ЦУ</strong> — команда 4.</li>
        <li id="ПР"><strong>ПР</strong> — команда 5.</li>
        <li id="СИ"><strong>СИ</strong> — команда 6.</li>
        <li id="УП"><strong>УП</strong> — команда 7.</li>
        <li id="ПИ"><strong>ПИ</strong> — команда 8.</li>
        <li id="КЦ"><strong>КЦ</strong> — команда 9.</li>
    </ul>
</body>
</html>
