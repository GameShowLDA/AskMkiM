<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>3.26 УП (Условный Переход)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../../../content.css">
</head>
<body>
    <main class="page-content">

        <h2>3.26 УП (Условный Переход)</h2>

        <p>
            <h3>$ALG "Переход на команду label"</h3>
            Отмечает выполнение условного перехода на команду с меткой label.
        </p>

        <p>
            <h3>$ALG "УП-нет перехода";</h3>
            Отмечает невыполнение условного перехода. Сообщения выводятся для 
            информации о фактическом порядке выполнения ПК.
        </p>

    </main>
</body>
</html>
