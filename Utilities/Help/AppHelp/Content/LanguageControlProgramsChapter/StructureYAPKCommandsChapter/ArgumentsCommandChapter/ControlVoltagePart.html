        <h2>4.3.2 Напряжение контроля</h2>
        <p><strong>Напряжение контроля</strong> — это максимальная величина напряжения, которое может быть подано на проверяемые цепи ОК в процессе измерений.</p>
        <p><em>Примеры:</em></p>
        <ul>
            <li><code>10 В</code></li>
            <li><code>4 В</code></li>
        </ul>
        <p>При задании параметров ПИНТ для указания величины напряжения используется тот же формат.</p>
